# Quintern · Render Blueprint
#
# One-click deploy: open https://render.com → New → Blueprint → connect
# rajat-wyrm/Quintern → select this file → Apply.
#
# This creates:
#   - quintern-api  (Node web service, backend, free tier)
#   - quintern-web  (Static site, frontend, free tier)
#
# Required env vars to set manually in Render dashboard
# (or via API) BEFORE first deploy:
#   - DATABASE_URL            (from neon.tech)
#   - UPSTASH_REDIS_REST_URL  (from upstash.com)
#   - UPSTASH_REDIS_REST_TOKEN
#   - JWT_ACCESS_SECRET
#   - JWT_REFRESH_SECRET
#   - CSRF_SECRET
#   - GROQ_API_KEY
#   - GEMINI_API_KEY
#
# All other env vars default to safe production values.
#
# Cost: $0/month (Render free tier + Neon free + Upstash free)

services:
  # ─────────────────────────────────────────────────────────
  #  Backend — Fastify API
  # ─────────────────────────────────────────────────────────
  - type: web
    name: quintern-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: APP_URL
        sync: false          # set after first deploy to https://quintern-api.onrender.com
      - key: CORS_ORIGIN
        sync: false          # set to your frontend URL
      - key: LOG_LEVEL
        value: info
      - key: AI_PROVIDER
        value: heuristic     # default to heuristic in case API keys are missing
      - key: AI_TIMEOUT
        value: "8000"
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_GLOBAL
        value: "600"
      - key: RATE_LIMIT_AUTH
        value: "20"
      - key: DATABASE_URL
        sync: false          # REQUIRED — from neon.tech
      - key: UPSTASH_REDIS_REST_URL
        sync: false          # REQUIRED — from upstash.com
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true   # auto-generate a strong secret
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false          # optional — from console.groq.com
      - key: GEMINI_API_KEY
        sync: false          # optional — from aistudio.google.com
      - key: HUGGINGFACE_TOKEN
        sync: false          # optional
      - key: EMAIL_PROVIDER
        value: log            # log emails to stdout in dev
      - key: EMAIL_FROM
        value: noreply@quintern.local
      - key: SMTP_HOST
        value: localhost
      - key: SMTP_PORT
        value: "1025"

  # ─────────────────────────────────────────────────────────
  #  Frontend — Vite SPA
  # ─────────────────────────────────────────────────────────
  - type: static
    name: quintern-web
    rootDir: frontend
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && VITE_API_BASE=https://quintern-api.onrender.com/api npm run build
    publishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
